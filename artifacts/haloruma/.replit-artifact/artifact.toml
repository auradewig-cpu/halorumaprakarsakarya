kind = "web"
previewPath = "/"
title = "HALORUMA PRAKARSA KARYA"
version = "1.0.0"
id = "artifacts/haloruma"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20628

[services.development]
run = "pnpm --filter @workspace/haloruma run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/haloruma", "run", "build" ]
publicDir = "artifacts/haloruma/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20628"
BASE_PATH = "/"
